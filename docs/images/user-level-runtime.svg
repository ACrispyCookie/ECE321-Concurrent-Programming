<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1320" viewBox="0 0 1200 1320" role="img" aria-labelledby="title desc">
  <title id="title">Project 4 coroutine and user-level thread runtime</title>
  <desc id="desc">Clean vertical architecture diagram for Project 4: context primitives, round-robin scheduling, runtime API, and ported workloads.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#1e1b4b"/></linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".28"/></filter>
    <style>
      .title{font:800 43px Inter,Segoe UI,sans-serif;fill:#e0f2fe}.sub{font:500 23px Inter,Segoe UI,sans-serif;fill:#bfdbfe}.card{rx:26;fill:#0f172a;stroke:#334155;stroke-width:2.5;filter:url(#shadow)}.context{stroke:#38bdf8}.sched{stroke:#fbbf24}.api{stroke:#c084fc}.work{stroke:#86efac}.head{font:800 31px Inter,Segoe UI,sans-serif;fill:#f8fafc}.body{font:500 23px Inter,Segoe UI,sans-serif;fill:#cbd5e1}.small{font:500 19px Inter,Segoe UI,sans-serif;fill:#94a3b8}.numBg{fill:#67e8f9}.num{font:800 22px Inter,Segoe UI,sans-serif;fill:#0f172a}.chev{fill:#67e8f9}.pill{rx:12}.pillText{font:800 15px Inter,Segoe UI,sans-serif;fill:#0f172a}.blue{fill:#67e8f9}.yellow{fill:#fbbf24}.purple{fill:#c084fc}.green{fill:#86efac}.mono{font:800 20px ui-monospace,Consolas,monospace;fill:#fef3c7}.tag{font:800 18px Inter,Segoe UI,sans-serif;fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1200" height="1320" fill="url(#bg)"/>
  <path d="M0 1175 C210 1115 365 1250 610 1180 C815 1130 990 1200 1200 1130 L1200 1320 L0 1320 Z" fill="#0f766e" opacity=".14"/>
  <text x="60" y="74" class="title">Project 4 · coroutine and user-level thread runtime</text>
  <text x="62" y="118" class="sub">The final project implements scheduling primitives instead of only calling pthreads.</text>

  <g transform="translate(70,175)">
    <rect width="1060" height="185" class="card context"/>
    <circle cx="52" cy="70" r="27" class="numBg"/><text x="52" y="78" text-anchor="middle" class="num">1</text>
    <text x="100" y="60" class="head">Context primitives</text>
    <text x="100" y="102" class="body">Create and switch execution contexts with saved stacks.</text>
    <text x="100" y="138" class="mono">getcontext · makecontext · swapcontext</text>
    <rect x="830" y="62" width="160" height="40" class="pill blue"/><text x="910" y="89" text-anchor="middle" class="pillText">COROUTINES</text>
  </g>
  <path d="M560 390 h80 l-40 54 z" class="chev"/>

  <g transform="translate(70,475)">
    <rect width="1060" height="210" class="card sched"/>
    <circle cx="52" cy="78" r="27" class="numBg"/><text x="52" y="86" text-anchor="middle" class="num">2</text>
    <text x="100" y="62" class="head">Round-robin scheduler</text>
    <text x="100" y="104" class="body">Runnable user-level threads are kept in a ready queue.</text>
    <text x="100" y="140" class="small">Timer/signal preemption interrupts long-running work.</text>
    <text x="100" y="168" class="small">The scheduler selects the next runnable thread in turn.</text>
    <rect x="830" y="76" width="130" height="40" class="pill yellow"/><text x="895" y="103" text-anchor="middle" class="pillText">READY Q</text>
  </g>
  <path d="M560 715 h80 l-40 54 z" class="chev"/>

  <g transform="translate(70,800)">
    <rect width="1060" height="210" class="card api"/>
    <circle cx="52" cy="78" r="27" class="numBg"/><text x="52" y="86" text-anchor="middle" class="num">3</text>
    <text x="100" y="62" class="head">Runtime API</text>
    <text x="100" y="104" class="body">User code coordinates through runtime-level primitives.</text>
    <text x="100" y="140" class="mono">yield · sleep · join · binary semaphores</text>
    <text x="100" y="174" class="small">Dependent assignments reuse this runtime instead of OS threads.</text>
    <rect x="830" y="76" width="130" height="40" class="pill purple"/><text x="895" y="103" text-anchor="middle" class="pillText">API</text>
  </g>
  <path d="M560 1040 h80 l-40 54 z" class="chev"/>

  <g transform="translate(70,1125)">
    <rect width="1060" height="155" class="card work"/>
    <circle cx="52" cy="78" r="27" class="numBg"/><text x="52" y="86" text-anchor="middle" class="num">4</text>
    <text x="100" y="62" class="head">Ported workloads</text>
    <text x="100" y="104" class="body">FIFO transfer, primality workers, bridge, train, and readers/writers.</text>
    <text x="100" y="132" class="small">These workloads validate scheduler behavior under real coordination patterns.</text>
    <rect x="830" y="58" width="150" height="40" class="pill green"/><text x="905" y="85" text-anchor="middle" class="pillText">WORKLOADS</text>
  </g>
</svg>
